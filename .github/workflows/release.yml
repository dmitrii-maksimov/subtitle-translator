name: Build and Release

on:
  push:
    tags:
      - "v*"


jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      - name: Generate icon
        run: python make_icon.py

      - name: Build app
        run: |
          pyinstaller --noconfirm --onedir --noconsole \
            --name SubtitleTranslator \
            --icon subtitle_translator/SubtitleTranslator.icns \
            subtitle_translator/__main__.py

      - name: Create DMG
        run: |
          mkdir -p /tmp/dmg_staging
          cp -r dist/SubtitleTranslator.app /tmp/dmg_staging/
          ln -sf /Applications /tmp/dmg_staging/Applications
          hdiutil create \
            -volname "SubtitleTranslator" \
            -srcfolder /tmp/dmg_staging \
            -ov -format UDZO \
            dist/SubtitleTranslator-macOS.dmg

      - uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: dist/SubtitleTranslator-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --onefile --noconsole `
            --name SubtitleTranslator-windows `
            subtitle_translator\__main__.py

      - uses: actions/upload-artifact@v5
        with:
          name: windows-exe
          path: dist/SubtitleTranslator-windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get install -y libgl1 libglib2.0-0 libxcb-cursor0 wget

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      - name: Generate PNG icon
        run: |
          python3 -c "from make_icon import draw_icon; draw_icon(256).save('icon.png')"

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --noconsole \
            --name SubtitleTranslator \
            subtitle_translator/__main__.py

      - name: Create AppImage
        run: |
          cp -r dist/SubtitleTranslator AppDir
          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE="${SELF%%/*}"\nexec "$HERE/SubtitleTranslator" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun
          printf '[Desktop Entry]\nName=SubtitleTranslator\nExec=SubtitleTranslator\nIcon=SubtitleTranslator\nType=Application\nCategories=AudioVideo;Video;\n' > AppDir/SubtitleTranslator.desktop
          cp icon.png AppDir/SubtitleTranslator.png
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir dist/SubtitleTranslator-linux.AppImage

      - uses: actions/upload-artifact@v5
        with:
          name: linux-appimage
          path: dist/SubtitleTranslator-linux.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: macos-dmg
          path: artifacts

      - uses: actions/download-artifact@v5
        with:
          name: windows-exe
          path: artifacts

      - uses: actions/download-artifact@v5
        with:
          name: linux-appimage
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/SubtitleTranslator-macOS.dmg
            artifacts/SubtitleTranslator-windows.exe
            artifacts/SubtitleTranslator-linux.AppImage
          generate_release_notes: true
