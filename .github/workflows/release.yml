name: Build and Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      - name: Generate icon
        run: python make_icon.py

      - name: Build app
        run: |
          pyinstaller --noconfirm --onedir --noconsole \
            --name SubtitleTranslator \
            --icon subtitle_translator/SubtitleTranslator.icns \
            subtitle_translator/__main__.py

      - name: Create DMG
        run: |
          mkdir -p /tmp/dmg_staging
          cp -r dist/SubtitleTranslator.app /tmp/dmg_staging/
          ln -sf /Applications /tmp/dmg_staging/Applications
          hdiutil create \
            -volname "SubtitleTranslator" \
            -srcfolder /tmp/dmg_staging \
            -ov -format UDZO \
            dist/SubtitleTranslator-macOS.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/SubtitleTranslator-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --onefile --noconsole `
            --name SubtitleTranslator `
            subtitle_translator\__main__.py

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/SubtitleTranslator.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/SubtitleTranslator-macOS.dmg
            artifacts/SubtitleTranslator.exe
          generate_release_notes: true
