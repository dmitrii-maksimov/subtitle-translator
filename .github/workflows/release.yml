name: Build and Release

on:
  push:
    tags:
      - "v*"


jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      - name: Generate icon
        run: python make_icon.py

      - name: Build app
        run: |
          pyinstaller --noconfirm --onedir --noconsole \
            --name SubtitleTranslator \
            --icon subtitle_translator/SubtitleTranslator.icns \
            subtitle_translator/__main__.py

      - name: Create DMG
        run: |
          mkdir -p /tmp/dmg_staging
          cp -r dist/SubtitleTranslator.app /tmp/dmg_staging/
          ln -sf /Applications /tmp/dmg_staging/Applications
          hdiutil create \
            -volname "SubtitleTranslator" \
            -srcfolder /tmp/dmg_staging \
            -ov -format UDZO \
            dist/SubtitleTranslator-macOS.dmg

      - uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: dist/SubtitleTranslator-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --onefile --noconsole `
            --name SubtitleTranslator `
            subtitle_translator\__main__.py

      - uses: actions/upload-artifact@v5
        with:
          name: windows-exe
          path: dist/SubtitleTranslator.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get install -y libgl1 libglib2.0-0 libxcb-cursor0

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: |
          pyinstaller --noconfirm --onefile --noconsole \
            --name SubtitleTranslator \
            subtitle_translator/__main__.py

      - uses: actions/upload-artifact@v5
        with:
          name: linux-bin
          path: dist/SubtitleTranslator

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: macos-dmg
          path: artifacts

      - uses: actions/download-artifact@v5
        with:
          name: windows-exe
          path: artifacts

      - uses: actions/download-artifact@v5
        with:
          name: linux-bin
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/SubtitleTranslator-macOS.dmg
            artifacts/SubtitleTranslator.exe
            artifacts/SubtitleTranslator
          generate_release_notes: true
