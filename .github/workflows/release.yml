name: Build and Release

on:
  push:
    tags:
      - "v*"


jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      - name: Set version from tag
        run: python scripts/set_version.py ${{ github.ref_name }}

      - name: Generate icon
        run: python make_icon.py

      - name: Build app
        run: |
          pyinstaller --noconfirm --onedir --noconsole \
            --name SubtitleTranslator \
            --icon subtitle_translator/SubtitleTranslator.icns \
            subtitle_translator/__main__.py

      - name: Create DMG
        run: |
          mkdir -p /tmp/dmg_staging
          cp -r dist/SubtitleTranslator.app /tmp/dmg_staging/
          ln -sf /Applications /tmp/dmg_staging/Applications
          hdiutil create \
            -volname "SubtitleTranslator" \
            -srcfolder /tmp/dmg_staging \
            -ov -format UDZO \
            dist/SubtitleTranslator-macOS.dmg

      - uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: dist/SubtitleTranslator-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      - name: Set version from tag
        run: python scripts/set_version.py ${{ github.ref_name }}

      - name: Generate ICO icon
        run: |
          python -c "from make_icon import draw_icon; draw_icon(256).save('icon.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])"

      - name: Build app (onedir)
        run: |
          pyinstaller --noconfirm --onedir --noconsole `
            --name SubtitleTranslator `
            --icon icon.ico `
            subtitle_translator\__main__.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "/DRepoRoot=$(Get-Location)\" `
            packaging\windows\installer.iss

      - uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: installer_output/SubtitleTranslator-Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get install -y libgl1 libglib2.0-0 libxcb-cursor0 wget

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      - name: Set version from tag
        run: python scripts/set_version.py ${{ github.ref_name }}

      - name: Generate PNG icon
        run: |
          python3 -c "from make_icon import draw_icon; draw_icon(256).save('icon.png')"

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --noconsole \
            --name SubtitleTranslator \
            subtitle_translator/__main__.py

      - name: Create AppImage
        run: |
          cp -r dist/SubtitleTranslator AppDir
          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE="${SELF%%/*}"\nexec "$HERE/SubtitleTranslator" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun
          printf '[Desktop Entry]\nName=SubtitleTranslator\nExec=SubtitleTranslator\nIcon=SubtitleTranslator\nType=Application\nCategories=AudioVideo;Video;\n' > AppDir/SubtitleTranslator.desktop
          cp icon.png AppDir/SubtitleTranslator.png
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir dist/SubtitleTranslator-linux.AppImage

      - name: Build .deb package
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash packaging/linux/build_deb.sh \
            "$version" \
            dist/SubtitleTranslator \
            icon.png \
            dist/SubtitleTranslator-linux.deb

      - uses: actions/upload-artifact@v5
        with:
          name: linux-appimage
          path: dist/SubtitleTranslator-linux.AppImage

      - uses: actions/upload-artifact@v5
        with:
          name: linux-deb
          path: dist/SubtitleTranslator-linux.deb

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: macos-dmg
          path: artifacts

      - uses: actions/download-artifact@v5
        with:
          name: windows-installer
          path: artifacts

      - uses: actions/download-artifact@v5
        with:
          name: linux-appimage
          path: artifacts

      - uses: actions/download-artifact@v5
        with:
          name: linux-deb
          path: artifacts

      - name: Build release notes from CHANGELOG
        run: |
          # Fails the release if this version has no CHANGELOG.md section.
          python scripts/extract_changelog.py ${{ github.ref_name }} > release_notes.md
          cat >> release_notes.md <<'EOF'

          ## Downloads

          | Platform | File |
          |----------|------|
          | macOS | `SubtitleTranslator-macOS.dmg` |
          | Windows | `SubtitleTranslator-Setup.exe` (installer) |
          | Linux | `SubtitleTranslator-linux.AppImage` (portable) |
          | Linux (Debian/Ubuntu) | `SubtitleTranslator-linux.deb` |

          ## Requirements

          - **macOS**: [ffmpeg](https://formulae.brew.sh/formula/ffmpeg) via `brew install ffmpeg`
          - **Windows**: ffmpeg downloaded automatically on first launch
          - **Linux**: `sudo apt install ffmpeg` or equivalent
          - An OpenAI-compatible API key and endpoint

          ## macOS: first launch

          The app is not notarized. To bypass the Gatekeeper warning, run once in Terminal:
          ```bash
          xattr -cr /Applications/SubtitleTranslator.app
          ```
          Or: right-click the app → **Open** → **Open**.

          ## Linux: first launch

          ```bash
          chmod +x SubtitleTranslator-linux.AppImage
          ./SubtitleTranslator-linux.AppImage
          ```
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            artifacts/SubtitleTranslator-macOS.dmg
            artifacts/SubtitleTranslator-Setup.exe
            artifacts/SubtitleTranslator-linux.AppImage
            artifacts/SubtitleTranslator-linux.deb
